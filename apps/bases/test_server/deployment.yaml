apiVersion: apps/v1
kind: Deployment
metadata:
  name: testapp
  labels:
    app.kubernetes.io/name: testapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: testapp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: testapp
    spec:
      containers:
        - name: testapp
          image: ghcr.io/ProcopVladimirAlexandru/testapp:latest
          ports:
            - containerPort: 8080
